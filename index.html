<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#fff9f9,#ffe4e6);font-family:sans-serif;overflow:hidden;text-align:center}.card{background:#fff;padding:30px;border-radius:30px;box-shadow:0 20px 40px rgba(255,182,193,.4);width:80%;border:2px solid #ffccd5}h1{color:#e91e63;font-size:22px}p{color:#6d4c41;font-size:16px}.btn{background:#ff4081;color:#fff;border:none;padding:15px;border-radius:50px;font-size:18px;width:100%;font-weight:700;margin-top:20px;cursor:pointer}#m{margin-top:20px;min-height:60px;display:flex;align-items:center;justify-content:center;color:#880e4f;background:#fff5f8;border-radius:20px;padding:10px;border:2px dashed #ff80ab}.h{position:absolute;color:#ff4081;animation:f 4s linear forwards;pointer-events:none}@keyframes f{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-110vh);opacity:0}}</style></head><body><div class="card"><div style="font-size:50px">🌸</div><h1>С Днем Рождения!</h1><p>Мамуля, пусть каждый твой день будет светлым. Ты лучшая!</p><div id="m">Нажми на кнопку ❤️</div><button class="btn" onclick="s()">Узнать пожелание</button><div style="margin-top:15px;color:#ad1457">Твой сын Сережа</div></div><script>const ms=["Здоровья! 💪","Улыбайся! 😊","Я люблю тебя! ❤️","Я всегда рядом! 🌟"];let i=0;function s(){document.getElementById("m").innerText=ms[i];i=(i+1)%ms.length;const h=document.createElement("div");h.className="h";h.innerHTML="❤️";h.style.left=Math.random()*90+"vw";h.style.bottom="0";document.body.appendChild(h);setTimeout(()=>h.remove(),4000)}</script></body></html>
